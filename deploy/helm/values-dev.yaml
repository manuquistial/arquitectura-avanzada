# Development Environment Overrides
# Use with: helm install -f values.yaml -f values-dev.yaml

global:
  environment: development
  redis:
    host: redis
    port: 6379
    passwordSecretName: redis-secrets

# Disable monitoring for now
monitoring:
  enabled: false

# Disable observability for now
observability:
  prometheus:
    enabled: false

# Disable ServiceMonitor for transfer-worker
transferWorker:
  serviceMonitor:
    enabled: false

# Disable migration hooks for initial deployment
migrations:
  enabled: false

# Enable all services for full deployment
notification:
  enabled: true
sharing:
  enabled: true
signature:
  enabled: true
ingestion:
  enabled: true
readModels:
  enabled: true
transfer:
  enabled: true
metadata:
  enabled: true
citizen:
  enabled: true
auth:
  enabled: true

# Frontend configuration for development
frontend:
  nextAuth:
    secret: "dev-secret-key-change-in-production"
    url: "http://localhost:3000"
    demoUsers:
      admin:
        email: "admin@carpeta.com"
        password: "admin123"
        name: "Administrador"
        roles: ["admin"]
      user:
        email: "demo@carpeta.com"
        password: "demo123"
        name: "Usuario Demo"
        roles: ["user"]

# CORS - Dev permite todos los orígenes
cors:
  allowedOrigins: "*"
  allowCredentials: false

# MinTIC Hub - Dev permite URLs inseguras para testing
mintic:
  allowInsecureUrls: true

# Service Bus configuration
servicebus:
  namespace: dev-carpeta-servicebus
  connectionString: ""  # Will be set from Key Vault

# Redis configuration
redis:
  host: redis
  port: 6379
  password: ""  # Will be set from Key Vault

# Database configuration
database:
  host: "dev-psql-server.postgres.database.azure.com"
  port: 5432
  name: "carpeta_ciudadana"
  username: "psqladmin"
  password: "CarpetaCiudadana2024!Secure"

# Ingress for Development
ingress:
  enabled: true
  className: nginx
  tls:
    enabled: false  # Set to true when you have a dev domain
    secretName: carpeta-ciudadana-tls-dev
    certManager:
      enabled: true
      clusterIssuer: letsencrypt-staging  # Use staging for dev
      acmeChallenge: http01
  hosts:
    - host: ""  # Set to dev.carpeta-ciudadana.example.com when available
      paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: frontend
              port: 80
        - path: /api
          pathType: Prefix
          backend:
            service:
              name: gateway
              port: 8000

# Dev: 1 réplica, sin HPA, recursos mínimos
frontend:
  replicaCount: 1
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "512Mi"
      cpu: "200m"
  autoscaling:
    enabled: false
  auth:
    # Azure AD B2C Configuration (optional - leave empty to use traditional login only)
    azureAdB2C:
      tenantId: ""
      clientId: ""
      clientSecret: ""
      primaryUserFlow: "B2C_1_signupsignin1"
    # Traditional login credentials (for demo)
    demoUsers:
      - email: "admin@carpeta.com"
        password: "admin123"
        name: "Administrador"
        role: "admin"
      - email: "demo@carpeta.com"
        password: "demo123"
        name: "Usuario Demo"
        role: "user"

gateway:
