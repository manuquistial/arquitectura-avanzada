# Production Environment Configuration
global:
  environment: production
  workloadIdentity:
    clientId: "7a9de5c0-250c-4e00-a3f8-861b6cbc1c8c"  # AKS Managed Identity Client ID
  
  m2mAuth:
    enabled: true
  
  resourceOptimization:
    enabled: false
  
  security:
    hstsEnabled: true
  
  redis:
    host: redis
    port: 6379
    passwordSecretName: redis-secrets

# Database configuration
database:
  host: "production-psql-k85bv.postgres.database.azure.com"
  port: 5432
  name: "carpeta_ciudadana"
  username: "psqladmin"
  password: "CarpetaCiudadana2024!Secure"

# Service Bus configuration
servicebus:
  namespace: production-carpeta-servicebus
  connectionString: ""  # Will be set from Key Vault

# Azure Storage configuration
azureStorage:
  accountName: productioncarpetastorage
  connectionString: ""  # Will be set from Key Vault

# MinTIC Hub configuration
mintic:
  hubUrl: "https://hub.mintic.gov.co"
  allowInsecureUrls: false

# Enable all services
notification:
  enabled: true
sharing:
  enabled: true
signature:
  enabled: true
ingestion:
  enabled: true
readModels:
  enabled: true
transfer:
  enabled: true
metadata:
  enabled: true
citizen:
  enabled: true
auth:
  enabled: true

# Frontend configuration
frontend:
  replicaCount: 1
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70

gateway:
  replicaCount: 2
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

# Backend services
citizen:
  replicaCount: 2
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70

ingestion:
  replicaCount: 1
  resources:
    requests:
      memory: "64Mi"
      cpu: "25m"
    limits:
      memory: "128Mi"
      cpu: "100m"

metadata:
  replicaCount: 1
  resources:
    requests:
      memory: "64Mi"
      cpu: "25m"
    limits:
      memory: "128Mi"
      cpu: "100m"

readModels:
  replicaCount: 1
  resources:
    requests:
      memory: "64Mi"
      cpu: "25m"
    limits:
      memory: "128Mi"
      cpu: "100m"

signature:
  replicaCount: 1
  resources:
    requests:
      memory: "64Mi"
      cpu: "25m"
    limits:
      memory: "128Mi"
      cpu: "100m"

transfer:
  replicaCount: 1
  resources:
    requests:
      memory: "64Mi"
      cpu: "25m"
    limits:
      memory: "128Mi"
      cpu: "100m"

sharing:
  replicaCount: 1
  resources:
    requests:
      memory: "64Mi"
      cpu: "25m"
    limits:
      memory: "128Mi"
      cpu: "100m"

notification:
  replicaCount: 1
  resources:
    requests:
      memory: "64Mi"
      cpu: "25m"
    limits:
      memory: "128Mi"
      cpu: "100m"

minticClient:
  replicaCount: 1
  resources:
    requests:
      memory: "64Mi"
      cpu: "25m"
    limits:
      memory: "128Mi"
      cpu: "100m"

# Ingress configuration
ingress:
  enabled: true
  className: nginx
  tls:
    enabled: true
    secretName: carpeta-ciudadana-tls
    certManager:
      enabled: true
      clusterIssuer: letsencrypt-prod
      acmeChallenge: http01
  hosts:
    - host: "app.carpeta-ciudadana.com"
      paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: frontend
              port: 80
        - path: /api
          pathType: Prefix
          backend:
            service:
              name: gateway
              port: 8000

# Monitoring
monitoring:
  enabled: false

observability:
  prometheus:
    enabled: false

# Disable migration hooks for initial deployment
migrations:
  enabled: false
